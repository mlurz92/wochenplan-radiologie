<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>Wochenplan Radiologie - Editor</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <!-- Schriftarten und Stylesheets -->
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="wrapper">
        <nav>
            <div class="nav-left">
                <h1>Wochenplan</h1>
                <div id="week-display">
                    <button id="prev-week">&lt;</button>
                    <div id="week-picker-container">
                        <span id="calendar-icon">📅</span>
                        <input type="text" id="week-picker" class="hidden">
                        <span id="current-week"></span>
                    </div>
                    <button id="next-week">&gt;</button>
                </div>
            </div>
            <div class="nav-right">
                <button class="day-button" data-day="1">Mo</button>
                <button class="day-button" data-day="2">Di</button>
                <button class="day-button" data-day="3">Mi</button>
                <button class="day-button" data-day="4">Do</button>
                <button class="day-button" data-day="5">Fr</button>
                <button class="day-button" data-day="6">Sa</button>
                <button class="day-button" data-day="7">So</button>
            </div>
        </nav>

        <div id="main-container">
            <div id="staff-pool">
                <div id="fa-pool">
                    <h2>Fachärzte</h2>
                    <ul class="staff-list-items"></ul>
                </div>
                <div id="aa-pool">
                    <h2>Assistenzärzte</h2>
                    <ul class="staff-list-items"></ul>
                </div>
            </div>

            <div id="workplan-area" role="main">
                <div id="workplace-cards"></div>
                <div id="additional-status-cards"></div>
                <textarea id="daily-notes-input" rows="2" placeholder="Notizen für den Tag"></textarea>
            </div>
        </div>

        <div id="button-area">
            <button id="week-overview">Wochenübersicht</button>
            <button id="pdf-export">Export als PDF</button>
            <button id="reset-day">Tag zurücksetzen</button>
            <button id="reset-week">Woche zurücksetzen</button>
            <button id="save-plan">Speichern</button>
            <button id="back-to-viewer">Zurück zu Viewer</button>
        </div>
    </div>

    <!-- Skripte -->
    <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.20/jspdf.plugin.autotable.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Sortable/1.14.0/Sortable.min.js"></script>
    <script src="https://unpkg.com/feather-icons"></script>
    <script src="app.js"></script>
</body>
</html>
