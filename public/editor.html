<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wochenplan Radiologie - Editor</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="wrapper">
        <nav>
            <div class="nav-left">
                <h1>Wochenplan</h1>
                <div id="week-display">
                    <button id="prev-week">&lt;</button>
                    <div id="week-picker-container">
                        <span id="calendar-icon">📅</span>
                        <span id="current-week"></span>
                    </div>
                    <button id="next-week">&gt;</button>
                </div>
            </div>
            <div class="nav-right">
                <button class="day-button" data-day="1">Mo</button>
                <button class="day-button" data-day="2">Di</button>
                <button class="day-button" data-day="3">Mi</button>
                <button class="day-button" data-day="4">Do</button>
                <button class="day-button" data-day="5">Fr</button>
                <button class="day-button" data-day="6">Sa</button>
                <button class="day-button" data-day="7">So</button>
            </div>
        </nav>
        <div id="main-container">
            <div id="staff-pool">
                <div id="fa-pool">
                    <h2>Fachärzte</h2>
                    <ul class="staff-list-items"></ul>
                </div>
                <div id="aa-pool">
                    <h2>Assistenzärzte</h2>
                    <ul class="staff-list-items"></ul>
                </div>
            </div>
            <div id="workplan-area" role="main">
                <div id="workplace-cards"></div>
                <div id="additional-status-cards"></div>
            </div>
        </div>
        <div id="notes-area">
            <div id="weekly-notes">
                <h3>Wöchentliche Notizen</h3>
                <textarea id="notes-input"></textarea>
            </div>
            <div id="daily-notes">
                <h3>Tagesnotizen</h3>
                <textarea id="daily-notes-input"></textarea>
            </div>
        </div>
        <div id="button-area">
            <button id="week-overview">Wochenübersicht</button>
            <button id="pdf-export">Export als PDF</button>
            <button id="reset-day">Tag zurücksetzen</button>
            <button id="reset-week">Woche zurücksetzen</button>
            <button id="save-plan">Speichern</button>
            <button id="back-to-viewer">Zurück zu Viewer</button>
        </div>
    </div>
    <script src="app.js"></script>
</body>
</html>
